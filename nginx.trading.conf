# Nginx config — BotTrading API
# Subdominio: trading.deportivospro.com
# Puerto PM2:  4060
#
# En el servidor:
#   sudo cp nginx.trading.conf /etc/nginx/sites-available/trading.deportivospro.com
#   sudo ln -s /etc/nginx/sites-available/trading.deportivospro.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d trading.deportivospro.com

server {
    listen 80;
    listen [::]:80;
    server_name trading.deportivospro.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trading.deportivospro.com;

    ssl_certificate     /etc/letsencrypt/live/trading.deportivospro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trading.deportivospro.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    gzip on;
    gzip_types application/json text/plain;

    # REST API + WebSocket (Socket.IO)
    location / {
        proxy_pass         http://127.0.0.1:4060;
        proxy_http_version 1.1;

        # WebSocket upgrade (Socket.IO lo requiere)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
